id: FR3_FR31Chan
label: MiniFR3(Not functioning)
category: '[Pi-Radio]'

templates:
  imports: from gnuradio import FR3
  make: FR3.FR31Chan(${RFfreq}, ${IFfreq}, ${RXgain}, ${TXgain}, ${serial})
  callbacks:
  - set_RFfreq(${RFfreq})
  - set_IFfreq(${IFfreq})
  - set_RXgain(${RXgain})
  - set_TXgain(${TXgain})
  
parameters:
- id: RFfreq
  label: RF Frequency
  dtype: float
  default: 10000000000.0
  setter: set_RFfreq  

- id: IFfreq
  label: IF Frequency
  dtype: float
  default: 1600000000.0
  setter: set_IFfreq  

- id: RXgain
  label: RX Gain 
  dtype: float
  default: 30.0
  setter: set_RXgain 
- id: TXgain
  label: TX Gain 
  dtype: float
  default: 30.0
  setter: set_TXgain
 
- id: serial
  label: Serial port
  dtype: string
  default: '/dev/'
  


  
inputs: 
  - domain: message
    type: float
    id: RF_freq
    optional: true
  - domain: message
    type: float
    id: IF_freq
    optional: true
  - domain: message
    type: float
    id: RX_gain
    optional: true
  - domain: message
    type: float
    id: TX_gain
    optional: true

    
file_format: 1
